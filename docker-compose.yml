services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - ./:/app
    depends_on:
      - postgres
      - redis
    command: poetry run python -m crypto_trader.cli --help
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      - POSTGRES_USER=trader
      - POSTGRES_PASSWORD=trader
      - POSTGRES_DB=trader
    ports:
      - "5432:5432"
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
